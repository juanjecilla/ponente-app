# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
language: en-US
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: 'src/**/*.{ts,tsx}'
      instructions: >-
        Focus on security (no secrets, injection, unsafe DOM), accessibility
        (labels, roles, keyboard), and test coverage. Flag any direct Sentry or
        Analytics import for errors (must use lib/error-tracker), any direct
        storage SDK import (must use lib/storage), any hardcoded topic/tag list
        (must read the tags collection), and any user-facing string not wrapped
        in t().
    - path: 'firestore.rules'
      instructions: >-
        Scrutinize authorization: ownership checks, the publish gate, and that
        admin-only fields (disabled, gdeVerified, reportCount) cannot be written
        by clients.
chat:
  auto_reply: true
