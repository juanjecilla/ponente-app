version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
    # Group minor/patch bumps into a single PR to reduce review + CI-minute churn.
    # Security updates are deliberately excluded from grouping so they surface
    # individually and can be merged fast.
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
    groups:
      github-actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
